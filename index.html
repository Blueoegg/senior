<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子传输 | 高级文件共享</title>
    <!-- Removed Google Fonts for China accessibility, using system native fonts in CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Admin Top Right Login -->
    <div class="auth-bar">
        <button id="admin-login-btn" class="auth-btn">🔑 站长登录</button>
        <button id="admin-logout-btn" class="auth-btn" style="display: none; background: rgba(239,68,68,0.2); color: #ef4444; border-color: rgba(239,68,68,0.5);">🚪 退出</button>
    </div>

    <main class="container">
        <header class="app-header">
            <h1>量子<span class="highlight">传输</span></h1>
            <p id="app-subtitle">安全、快速地将您的文件发送到云端。</p>
        </header>

        <!-- Upload Section (Hidden for normal users by default) -->
        <section class="upload-section" id="upload-section" style="display: none;">
            <div id="drop-zone" class="drop-zone">
                <div class="drop-zone-content">
                    <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p class="drop-text">将文件拖拽至此处</p>
                    <p class="sub-text">或</p>
                    <label for="file-input" class="browse-btn">浏览文件</label>
                    <input type="file" id="file-input" multiple hidden>
                </div>
            </div>
            
            <!-- Uploading Queue (Current session uploads) -->
            <div class="uploads-container" id="uploads-container">
                <!-- New upload items will be inserted here temporarily -->
            </div>
        </section>
        
        <script>
            // A small script to show the upload section only if a token is in localStorage before React/main logic boots up, to avoid flickering
            if (localStorage.getItem('QD_GITHUB_TOKEN')) {
                document.getElementById('upload-section').style.display = 'block';
            } else {
                document.getElementById('app-subtitle').textContent = '世界上最优雅的云端文件保险箱。';
            }
        </script>

        <!-- Past Files Vault -->
        <section class="vault-section" id="vault-section">
            <div class="vault-header">
                <h2>文件保险箱</h2>
                <button id="refresh-btn" class="refresh-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    刷新
                </button>
            </div>
            <div id="vault-content" class="vault-content">
                <p style="text-align: center; color: var(--text-secondary);">加载中...</p>
            </div>
        </section>
    </main>

    <!-- Preview Modal -->
    <div id="preview-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="preview-container"></div>
        </div>
    </div>

    <!-- Login/Settings Modal -->
    <div id="login-modal" class="modal">
        <div class="login-card">
            <h3>站长权限验证</h3>
            <p>请输入您的 GitHub Personal Access Token 以解锁上传与删除功能。您的密钥将以极高安全性存储在您当前浏览器的本地缓存中（LocalStorage），不会发送给任何服务器。</p>
            <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxx" />
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button id="save-token-btn" class="browse-btn" style="flex: 1;">保存并验证</button>
                <button id="cancel-token-btn" class="refresh-btn" style="flex: 1; justify-content: center;">取消</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
