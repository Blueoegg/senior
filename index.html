<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子传输 | 高级文件共享</title>
    <!-- Removed Google Fonts for China accessibility, using system native fonts in CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <header class="app-header">
            <h1>量子<span class="highlight">传输</span></h1>
            <p>安全、快速地将您的文件发送到云端。</p>
        </header>

        <section class="upload-section">
            <div id="drop-zone" class="drop-zone">
                <div class="drop-zone-content">
                    <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p class="drop-text">将文件拖拽至此处</p>
                    <p class="sub-text">或</p>
                    <label for="file-input" class="browse-btn">浏览文件</label>
                    <input type="file" id="file-input" multiple hidden>
                </div>
            </div>
        </section>
        
        <!-- Uploading Queue (Current session uploads) -->
        <section class="uploads-container" id="uploads-container">
            <!-- New upload items will be inserted here temporarily -->
        </section>

        <!-- Past Files Vault -->
        <section class="vault-section" id="vault-section">
            <div class="vault-header">
                <h2>文件保险箱</h2>
                <button id="refresh-btn" class="refresh-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    刷新
                </button>
            </div>
            <div id="vault-content" class="vault-content">
                <p style="text-align: center; color: var(--text-secondary);">加载中...</p>
            </div>
        </section>
    </main>

    <!-- Preview Modal -->
    <div id="preview-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="preview-container"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
